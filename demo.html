<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creator Cloud Studio - Demo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }
        h1 { color: #333; margin-bottom: 8px; font-size: 28px; }
        .subtitle { color: #666; margin-bottom: 30px; font-size: 14px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #333; font-weight: 600; font-size: 14px; }
        input, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1e1e1;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        input:focus, textarea:focus { outline: none; border-color: #667eea; }
        textarea { resize: vertical; min-height: 100px; }
        .hint { font-size: 12px; color: #888; margin-top: 4px; }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        .result {
            margin-top: 30px;
            padding: 20px;
            border-radius: 12px;
            display: none;
        }
        .result.show { display: block; }
        .result.ready { background: #d4edda; border: 2px solid #28a745; }
        .result.needs-revision { background: #fff3cd; border: 2px solid #ffc107; }
        .result.incomplete { background: #f8d7da; border: 2px solid #dc3545; }
        .status-badge {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .status-ready { background: #28a745; color: white; }
        .status-needs-revision { background: #ffc107; color: #333; }
        .status-incomplete { background: #dc3545; color: white; }
        .loading {
            text-align: center;
            padding: 20px;
            display: none;
        }
        .loading.show { display: block; }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <h1>Creator Cloud Studio</h1>
        <p class="subtitle">Submit your event poster for review (Demo Mode)</p>
        
        <form id="submissionForm">
            <div class="form-group">
                <label for="title">Event Title *</label>
                <input type="text" id="title" name="title" placeholder="Enter event title" required>
            </div>
            
            <div class="form-group">
                <label for="description">Description *</label>
                <textarea id="description" name="description" placeholder="Describe your event (minimum 30 characters)" required></textarea>
                <p class="hint" id="descHint">0/30 characters minimum</p>
            </div>
            
            <div class="form-group">
                <label for="poster_filename">Poster Image Filename *</label>
                <input type="text" id="poster_filename" name="poster_filename" placeholder="e.g., poster.jpg" required>
                <p class="hint">Supported formats: .jpg, .jpeg, .png</p>
            </div>
            
            <button type="submit" id="submitBtn">Submit Poster</button>
        </form>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Processing your submission...</p>
        </div>
        
        <div class="result" id="result"></div>
    </div>
    
    <script>
        // Validation rules (same as server-side)
        function validateSubmission(data) {
            const required = ['title', 'description', 'poster_filename'];
            for (const field of required) {
                if (!data[field] || data[field].trim() === '') {
                    return { status: 'INCOMPLETE', note: 'Missing required field: ' + field };
                }
            }
            
            if (data.description.length < 30) {
                return { status: 'NEEDS_REVISION', note: 'Description must be at least 30 characters long.' };
            }
            
            const validExtensions = ['.jpg', '.jpeg', '.png'];
            const ext = '.' + data.poster_filename.split('.').pop().toLowerCase();
            if (!validExtensions.includes(ext)) {
                return { status: 'NEEDS_REVISION', note: 'Invalid file extension. Only .jpg, .jpeg, and .png are allowed.' };
            }
            
            return { status: 'READY', note: 'All checks passed. Your submission is ready for review!' };
        }
        
        const form = document.getElementById('submissionForm');
        const loading = document.getElementById('loading');
        const result = document.getElementById('result');
        const descInput = document.getElementById('description');
        const descHint = document.getElementById('descHint');
        
        descInput.addEventListener('input', function() {
            const len = this.value.length;
            descHint.textContent = len < 30 ? `${len}/30 characters minimum` : `${len} characters (OK)`;
            descHint.style.color = len >= 30 ? '#28a745' : '#888';
        });
        
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const data = {
                title: document.getElementById('title').value,
                description: document.getElementById('description').value,
                poster_filename: document.getElementById('poster_filename').value
            };
            
            form.style.display = 'none';
            loading.classList.add('show');
            
            // Simulate processing delay
            setTimeout(() => {
                const validation = validateSubmission(data);
                showResult(validation);
            }, 1500);
        });
        
        function showResult(validation) {
            loading.classList.remove('show');
            result.classList.add('show');
            
            let statusClass = validation.status.toLowerCase().replace('_', '-');
            
            result.innerHTML = `
                <span class="status-badge status-${statusClass}">${validation.status}</span>
                <p>${validation.note}</p>
                <p style="margin-top: 10px; font-size: 12px; color: #666;">
                    Processed by: Processing Function (Serverless)
                </p>
            `;
        }
    </script>
</body>
</html>

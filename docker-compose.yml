services:
  data-service:
    build:
      context: .
      dockerfile: containers/data_service/Dockerfile
    container_name: creator-data-service
    environment:
      DATABASE_PATH: /data/submissions.db
    volumes:
      - data-service-db:/data
    ports:
      - "5002:5002"

  workflow-service:
    build:
      context: .
      dockerfile: containers/workflow_service/Dockerfile
    container_name: creator-workflow-service
    environment:
      DATA_SERVICE_URL: http://data-service:5002
      LOCAL_ASYNC_MODE: "true"
      PROCESSING_FUNCTION_NAME: processing-fn
      RESULT_UPDATE_FUNCTION_NAME: result-update-fn
    depends_on:
      - data-service
    volumes:
      - ./functions/submission_event:/functions/submission_event
      - ./functions/processing_function:/functions/processing_function
      - ./functions/result_update:/functions/result_update
    ports:
      - "5001:5001"

  presentation-service:
    build:
      context: .
      dockerfile: containers/presentation_service/Dockerfile
    container_name: creator-presentation-service
    environment:
      WORKFLOW_SERVICE_URL: http://workflow-service:5001
    depends_on:
      - workflow-service
    ports:
      - "5000:5000"

volumes:
  data-service-db:
